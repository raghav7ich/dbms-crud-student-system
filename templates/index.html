<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student CRUD Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f6f8;
        }
        h1, h2 {
            color: #333;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        input {
            padding: 10px;
            margin: 8px 0;
            width: 250px;
            display: block;
        }
        button {
            padding: 10px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        .update-form input {
            width: 140px;
            margin: 4px auto;
        }
        .update-form button {
            margin-top: 5px;
            background-color: green;
        }
        .update-form button:hover {
            background-color: darkgreen;
        }
    </style>
</head>
<body>

    <h1>Student CRUD Application</h1>

    <h2>Add Student</h2>
    <form method="POST" action="/add">
        <input type="text" name="full_name" placeholder="Enter full name" required>
        <input type="email" name="email" placeholder="Enter email" required>
        <input type="text" name="phone" placeholder="Enter phone">
        <input type="text" name="address" placeholder="Enter address">
        <button type="submit">Add Student</button>
    </form>

    <h2>Student List</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Created At</th>
            <th>Update</th>
            <th>Delete</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
            <td>{{ student[3] }}</td>
            <td>{{ student[4] }}</td>
            <td>{{ student[5] }}</td>
            <td>
                <form class="update-form" method="POST" action="/update/{{ student[0] }}">
                    <input type="text" name="full_name" value="{{ student[1] }}" required>
                    <input type="email" name="email" value="{{ student[2] }}" required>
                    <input type="text" name="phone" value="{{ student[3] }}">
                    <input type="text" name="address" value="{{ student[4] }}">
                    <button type="submit">Update</button>
                </form>
            </td>
            <td>
                <a href="/delete/{{ student[0] }}" onclick="return confirm('Are you sure you want to delete this student?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
